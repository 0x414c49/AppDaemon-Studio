variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: $CI_REGISTRY_IMAGE

# Docker multi-arch setup
.docker-multiarch: &docker-multiarch
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --use --name multiarch-builder || docker buildx use multiarch-builder
    - docker buildx inspect --bootstrap

stages:
  - build

# Build and push amd64 image
build-amd64:
  stage: build
  <<: *docker-multiarch
  script:
    - docker buildx build 
      --platform linux/amd64
      --tag $IMAGE_NAME/amd64:$CI_COMMIT_SHA
      --tag $IMAGE_NAME/amd64:latest
      --push
      .
  only:
    - main
    - tags

# Build and push aarch64 image (Home Assistant Green)
build-aarch64:
  stage: build
  <<: *docker-multiarch
  script:
    - docker buildx build 
      --platform linux/arm64
      --tag $IMAGE_NAME/aarch64:$CI_COMMIT_SHA
      --tag $IMAGE_NAME/aarch64:latest
      --push
      .
  only:
    - main
    - tags

# Create multi-arch manifest
build-manifest:
  stage: build
  <<: *docker-multiarch
  script:
    - docker manifest create $IMAGE_NAME:latest
      --amend $IMAGE_NAME/amd64:latest
      --amend $IMAGE_NAME/aarch64:latest
    - docker manifest push $IMAGE_NAME:latest
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker manifest create $IMAGE_NAME:$CI_COMMIT_TAG
          --amend $IMAGE_NAME/amd64:$CI_COMMIT_SHA
          --amend $IMAGE_NAME/aarch64:$CI_COMMIT_SHA
        docker manifest push $IMAGE_NAME:$CI_COMMIT_TAG
      fi
  only:
    - main
    - tags
