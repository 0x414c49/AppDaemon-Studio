variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2376
  DOCKER_CERT_PATH: "/certs/client"
  DOCKER_TLS_VERIFY: 1
  IMAGE_NAME: $CI_REGISTRY_IMAGE

stages:
  - build

# Build amd64 image
build-amd64:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - mkdir -p ~/.docker
    - |
      echo '{"experimental": "enabled"}' > ~/.docker/config.json
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --tag $IMAGE_NAME/amd64:$CI_COMMIT_SHA --tag $IMAGE_NAME/amd64:latest .
    - docker push $IMAGE_NAME/amd64:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME/amd64:latest
  only:
    - main
    - tags

# Build aarch64 image (Home Assistant Green)
build-aarch64:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - mkdir -p ~/.docker
    - |
      echo '{"experimental": "enabled"}' > ~/.docker/config.json
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --tag $IMAGE_NAME/aarch64:$CI_COMMIT_SHA --tag $IMAGE_NAME/aarch64:latest .
    - docker push $IMAGE_NAME/aarch64:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME/aarch64:latest
  only:
    - main
    - tags

# Create and push manifest
build-manifest:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - mkdir -p ~/.docker
    - |
      echo '{"experimental": "enabled"}' > ~/.docker/config.json
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker manifest create $IMAGE_NAME:latest --amend $IMAGE_NAME/amd64:latest --amend $IMAGE_NAME/aarch64:latest
    - docker manifest push $IMAGE_NAME:latest
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker manifest create $IMAGE_NAME:$CI_COMMIT_TAG --amend $IMAGE_NAME/amd64:$CI_COMMIT_SHA --amend $IMAGE_NAME/aarch64:$CI_COMMIT_SHA
        docker manifest push $IMAGE_NAME:$CI_COMMIT_TAG
      fi
  only:
    - main
    - tags
