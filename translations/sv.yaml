configuration:
  log_level:
    name: Loggnivå
    description: Detaljnivå för AppDaemon Studios egna loggar.

  appdaemon_addon_slug:
    name: AppDaemon-tilläggets slug
    description: >-
      Den interna identifieraren för ditt AppDaemon-tillägg (t.ex. a0d7b954_appdaemon).
      Används för att hämta loggar via Supervisor API.
      Lämna standardvärdet om du använder det vanliga AppDaemon-tillägget.

  apps_folder:
    name: Appmapp
    description: >-
      Sökväg till AppDaemon-appmappen inuti den här tilläggsbehållaren.

      Använd ett filredigeringstillägg (t.ex. Studio Code Server) för att öppna
      /addon_configs/appdaemon/appdaemon.yaml och ange app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Ange det här alternativet till samma sökväg: /homeassistant/apps

  api_password:
    name: AppDaemon API-lösenord
    description: >-
      api_password från AppDaemon HTTP API-konfigurationen.
      Lämna tomt om inget lösenord finns (standard).
      Behövs bara för funktionen att starta om appar.
