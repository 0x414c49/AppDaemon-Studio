configuration:
  log_level:
    name: Nivel de registro
    description: Nivel de detalle de los registros de AppDaemon Studio.

  appdaemon_addon_slug:
    name: Slug del complemento AppDaemon
    description: >-
      El identificador interno de tu complemento AppDaemon (p. ej. a0d7b954_appdaemon).
      Se usa para obtener registros a través de la API del Supervisor.
      Deja el valor predeterminado si usas el complemento AppDaemon estándar.

  apps_folder:
    name: Carpeta de aplicaciones
    description: >-
      Ruta al directorio de aplicaciones de AppDaemon dentro de este contenedor.

      Usa un complemento editor de archivos (p. ej. Studio Code Server) para abrir
      /addon_configs/appdaemon/appdaemon.yaml y establecer app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Luego establece esta opción con la misma ruta: /homeassistant/apps

  api_password:
    name: Contraseña de la API de AppDaemon
    description: >-
      El api_password de la configuración de la API HTTP de AppDaemon.
      Déjalo en blanco si no tiene contraseña (por defecto).
      Solo es necesario para la función de reinicio de aplicaciones.
