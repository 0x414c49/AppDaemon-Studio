configuration:
  log_level:
    name: ログレベル
    description: AppDaemon Studio 自身のログの詳細度。

  appdaemon_addon_slug:
    name: AppDaemon アドオンスラッグ
    description: >-
      AppDaemon アドオンの内部識別子（例：a0d7b954_appdaemon）。
      Supervisor API 経由でログを取得するために使用します。
      標準の AppDaemon アドオンを使用している場合はデフォルトのままにしてください。

  apps_folder:
    name: アプリフォルダ
    description: >-
      このアドオンコンテナ内の AppDaemon アプリディレクトリのパス。
      AppDaemon Studio と AppDaemon は config ボリューム（コンテナ内では
      /homeassistant）を通じて同じフォルダを共有する必要があります。

      AppDaemon アドオンでの設定方法：
        1. AppDaemon アドオン → 「設定」タブを開く
        2. appdaemon.yaml を編集して app_dir を /homeassistant に設定：
             appdaemon:
               app_dir: /homeassistant/apps
        3. このオプションを同じパスに設定：/homeassistant/apps

      両アドオンはデフォルトで「config」ボリュームがマウントされています。

  api_password:
    name: AppDaemon API パスワード
    description: >-
      AppDaemon の HTTP API 設定の api_password。
      AppDaemon HTTP API にパスワードがない場合（デフォルト）は空のままにしてください。
      アプリの再起動機能にのみ必要です。
