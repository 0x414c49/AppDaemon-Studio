configuration:
  log_level:
    name: Mức nhật ký
    description: Mức độ chi tiết của nhật ký AppDaemon Studio.

  appdaemon_addon_slug:
    name: Slug tiện ích AppDaemon
    description: >-
      Mã định danh nội bộ của tiện ích AppDaemon (ví dụ a0d7b954_appdaemon).
      Dùng để lấy nhật ký qua Supervisor API.
      Để mặc định nếu bạn dùng tiện ích AppDaemon tiêu chuẩn.

  apps_folder:
    name: Thư mục ứng dụng
    description: >-
      Đường dẫn đến thư mục ứng dụng AppDaemon bên trong container tiện ích này.

      Dùng tiện ích chỉnh sửa file (ví dụ Studio Code Server) để mở
      /addon_configs/appdaemon/appdaemon.yaml và đặt app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Sau đó đặt tùy chọn này cùng đường dẫn: /homeassistant/apps

  api_password:
    name: Mật khẩu API AppDaemon
    description: >-
      api_password từ cấu hình HTTP API của AppDaemon.
      Để trống nếu không có mật khẩu (mặc định).
      Chỉ cần thiết cho tính năng khởi động lại ứng dụng.
