configuration:
  log_level:
    name: مستوى السجل
    description: مستوى تفصيل سجلات AppDaemon Studio.

  appdaemon_addon_slug:
    name: معرّف إضافة AppDaemon
    description: >-
      المعرّف الداخلي لإضافة AppDaemon الخاصة بك (مثل a0d7b954_appdaemon).
      يُستخدم لجلب السجلات عبر Supervisor API.
      اتركه كما هو إذا كنت تستخدم إضافة AppDaemon القياسية.

  apps_folder:
    name: مجلد التطبيقات
    description: >-
      المسار إلى مجلد تطبيقات AppDaemon داخل حاوية هذه الإضافة.

      استخدم إضافة محرر ملفات (مثل Studio Code Server) لفتح
      /addon_configs/appdaemon/appdaemon.yaml وضبط app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      ثم اضبط هذا الخيار على نفس المسار: /homeassistant/apps

  api_password:
    name: كلمة مرور AppDaemon API
    description: >-
      api_password من إعدادات HTTP API لـ AppDaemon.
      اتركها فارغة إذا لم يكن هناك كلمة مرور (الافتراضي).
      مطلوبة فقط لميزة إعادة تشغيل التطبيق.
