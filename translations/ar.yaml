configuration:
  log_level:
    name: مستوى السجل
    description: مستوى تفصيل سجلات AppDaemon Studio.

  appdaemon_addon_slug:
    name: معرّف إضافة AppDaemon
    description: >-
      المعرّف الداخلي لإضافة AppDaemon الخاصة بك (مثل a0d7b954_appdaemon).
      يُستخدم لجلب السجلات عبر Supervisor API.
      اتركه كما هو إذا كنت تستخدم إضافة AppDaemon القياسية.

  apps_folder:
    name: مجلد التطبيقات
    description: >-
      المسار إلى مجلد تطبيقات AppDaemon داخل حاوية هذه الإضافة.
      يجب أن تتشارك AppDaemon Studio وAppDaemon نفس المجلد عبر
      وحدة تخزين config (/homeassistant داخل حاويات الإضافات).

      الإعداد في إضافة AppDaemon:
        1. افتح إضافة AppDaemon → تبويب الإعدادات
        2. عدّل appdaemon.yaml بحيث يشير app_dir إلى /homeassistant:
             appdaemon:
               app_dir: /homeassistant/apps
        3. اضبط هذا الخيار على نفس المسار: /homeassistant/apps

      كلتا الإضافتين تمتلكان وحدة تخزين "config" مربوطة افتراضيًا.

  api_password:
    name: كلمة مرور AppDaemon API
    description: >-
      api_password من إعدادات HTTP API لـ AppDaemon.
      اتركها فارغة إذا لم يكن لـ HTTP API كلمة مرور (الافتراضي).
      مطلوبة فقط لميزة إعادة تشغيل التطبيق.
