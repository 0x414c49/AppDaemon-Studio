configuration:
  log_level:
    name: Protokollstufe
    description: Ausführlichkeit der eigenen Protokolle von AppDaemon Studio.

  appdaemon_addon_slug:
    name: AppDaemon-Add-on-Slug
    description: >-
      Der interne Bezeichner deines AppDaemon-Add-ons (z. B. a0d7b954_appdaemon).
      Wird verwendet, um Protokolle über die Supervisor-API abzurufen.
      Behalte den Standardwert, wenn du das Standard-AppDaemon-Add-on verwendest.

  apps_folder:
    name: Apps-Ordner
    description: >-
      Pfad zum AppDaemon-Apps-Verzeichnis innerhalb dieses Add-on-Containers.

      Öffne mit einem Datei-Editor (z. B. Studio Code Server)
      /addon_configs/appdaemon/appdaemon.yaml und setze app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Setze diese Option dann auf denselben Pfad: /homeassistant/apps

  api_password:
    name: AppDaemon-API-Passwort
    description: >-
      Das api_password aus der HTTP-API-Konfiguration von AppDaemon.
      Leer lassen, wenn kein Passwort gesetzt ist (Standard).
      Nur für die App-Neustart-Funktion erforderlich.
