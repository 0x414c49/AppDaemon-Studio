configuration:
  log_level:
    name: लॉग स्तर
    description: AppDaemon Studio के अपने लॉग का विस्तार स्तर।

  appdaemon_addon_slug:
    name: AppDaemon ऐड-ऑन स्लग
    description: >-
      आपके AppDaemon ऐड-ऑन का आंतरिक पहचानकर्ता (जैसे a0d7b954_appdaemon)।
      Supervisor API के माध्यम से लॉग प्राप्त करने के लिए उपयोग किया जाता है।
      यदि आप मानक AppDaemon ऐड-ऑन उपयोग कर रहे हैं तो डिफ़ॉल्ट रहने दें।

  apps_folder:
    name: ऐप्स फ़ोल्डर
    description: >-
      इस ऐड-ऑन कंटेनर के अंदर AppDaemon ऐप्स डायरेक्टरी का पथ।

      एक फ़ाइल एडिटर ऐड-ऑन (जैसे Studio Code Server) का उपयोग करके
      /addon_configs/appdaemon/appdaemon.yaml खोलें और app_dir सेट करें:

        appdaemon:
          app_dir: "/homeassistant/apps"

      फिर यह विकल्प उसी पथ पर सेट करें: /homeassistant/apps

  api_password:
    name: AppDaemon API पासवर्ड
    description: >-
      AppDaemon HTTP API कॉन्फ़िगरेशन का api_password।
      यदि कोई पासवर्ड नहीं है (डिफ़ॉल्ट) तो खाली छोड़ें।
      केवल ऐप रीस्टार्ट फ़ीचर के लिए आवश्यक।
