configuration:
  log_level:
    name: Log level
    description: Verbosity of AppDaemon Studio's own logs.

  appdaemon_addon_slug:
    name: AppDaemon addon slug
    description: >-
      The internal slug of your AppDaemon addon (e.g. a0d7b954_appdaemon).
      Used to fetch logs via the Supervisor API. Leave as default if you are
      using the standard AppDaemon addon.

  apps_folder:
    name: Apps folder
    description: >-
      Path to your AppDaemon apps directory as seen from inside this addon.

      Use a file editor addon (e.g. Studio Code Server) to open
      /addon_configs/appdaemon/appdaemon.yaml and set app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Then set this option to the same path: /homeassistant/apps

  api_password:
    name: AppDaemon API password
    description: >-
      The api_password from your AppDaemon HTTP API configuration.
      Leave blank if your AppDaemon HTTP API has no password (default).
      Only needed for the app restart feature.
