configuration:
  log_level:
    name: লগ স্তর
    description: AppDaemon Studio-র নিজস্ব লগের বিস্তারিততার মাত্রা।

  appdaemon_addon_slug:
    name: AppDaemon অ্যাড-অন স্লাগ
    description: >-
      আপনার AppDaemon অ্যাড-অনের অভ্যন্তরীণ পরিচয়কারী (যেমন a0d7b954_appdaemon)।
      Supervisor API-এর মাধ্যমে লগ আনতে ব্যবহৃত হয়।
      স্ট্যান্ডার্ড AppDaemon অ্যাড-অন ব্যবহার করলে ডিফল্ট রাখুন।

  apps_folder:
    name: অ্যাপস ফোল্ডার
    description: >-
      এই অ্যাড-অন কন্টেইনারের ভেতরে AppDaemon অ্যাপস ডিরেক্টরির পাথ।
      AppDaemon Studio এবং AppDaemon-কে config ভলিউমের মাধ্যমে
      একই ফোল্ডার শেয়ার করতে হবে (কন্টেইনারে /homeassistant)।

      AppDaemon অ্যাড-অনে সেটআপ:
        1. AppDaemon অ্যাড-অন → কনফিগারেশন ট্যাব খুলুন
        2. appdaemon.yaml সম্পাদনা করুন, app_dir /homeassistant-এ সেট করুন:
             appdaemon:
               app_dir: /homeassistant/apps
        3. এই বিকল্পটি একই পাথে সেট করুন: /homeassistant/apps

      উভয় অ্যাড-অনেই ডিফল্টভাবে "config" ভলিউম ম্যাপ করা আছে।

  api_password:
    name: AppDaemon API পাসওয়ার্ড
    description: >-
      AppDaemon HTTP API কনফিগারেশনের api_password।
      HTTP API-তে পাসওয়ার্ড না থাকলে (ডিফল্ট) খালি রাখুন।
      শুধুমাত্র অ্যাপ পুনরায় চালু করার জন্য প্রয়োজন।
