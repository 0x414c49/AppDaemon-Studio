configuration:
  log_level:
    name: لاگ کی سطح
    description: AppDaemon Studio کے اپنے لاگز کی تفصیل کا درجہ۔

  appdaemon_addon_slug:
    name: AppDaemon ایڈ-آن سلگ
    description: >-
      آپ کے AppDaemon ایڈ-آن کا اندرونی شناخت کنندہ (مثلاً a0d7b954_appdaemon)۔
      Supervisor API کے ذریعے لاگز حاصل کرنے کے لیے استعمال ہوتا ہے۔
      اگر معیاری AppDaemon ایڈ-آن استعمال کر رہے ہیں تو ڈیفالٹ رہنے دیں۔

  apps_folder:
    name: ایپس فولڈر
    description: >-
      اس ایڈ-آن کنٹینر کے اندر AppDaemon ایپس ڈائریکٹری کا راستہ۔

      ایک فائل ایڈیٹر ایڈ-آن (مثلاً Studio Code Server) استعمال کریں تا کہ
      /addon_configs/appdaemon/appdaemon.yaml کھولیں اور app_dir سیٹ کریں:

        appdaemon:
          app_dir: "/homeassistant/apps"

      پھر یہ آپشن اسی راستے پر سیٹ کریں: /homeassistant/apps

  api_password:
    name: AppDaemon API پاسورڈ
    description: >-
      AppDaemon HTTP API ترتیب کا api_password۔
      اگر کوئی پاسورڈ نہیں (ڈیفالٹ) تو خالی چھوڑیں۔
      صرف ایپ دوبارہ شروع کرنے کی خصوصیت کے لیے ضروری ہے۔
