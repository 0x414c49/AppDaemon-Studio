configuration:
  log_level:
    name: Nível de registo
    description: Nível de verbosidade dos registos do próprio AppDaemon Studio.

  appdaemon_addon_slug:
    name: Slug do addon AppDaemon
    description: >-
      O identificador interno do seu addon AppDaemon (ex. a0d7b954_appdaemon).
      Usado para obter registos através da API do Supervisor.
      Deixe o valor padrão se utiliza o addon AppDaemon padrão.

  apps_folder:
    name: Pasta de aplicações
    description: >-
      Caminho para o diretório de aplicações AppDaemon dentro deste contentor.

      Use um addon editor de ficheiros (ex. Studio Code Server) para abrir
      /addon_configs/appdaemon/appdaemon.yaml e definir app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Defina esta opção com o mesmo caminho: /homeassistant/apps

  api_password:
    name: Palavra-passe da API AppDaemon
    description: >-
      O api_password da configuração HTTP API do AppDaemon.
      Deixe em branco se não há palavra-passe (padrão).
      Necessário apenas para a funcionalidade de reinício de aplicações.
