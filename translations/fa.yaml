configuration:
  log_level:
    name: سطح گزارش
    description: سطح جزئیات گزارش‌های خود AppDaemon Studio.

  appdaemon_addon_slug:
    name: شناسه افزونه AppDaemon
    description: >-
      شناسه داخلی افزونه AppDaemon شما (مثلاً a0d7b954_appdaemon).
      برای دریافت گزارش‌ها از طریق Supervisor API استفاده می‌شود.
      اگر از افزونه استاندارد AppDaemon استفاده می‌کنید، مقدار پیش‌فرض را نگه دارید.

  apps_folder:
    name: پوشه برنامه‌ها
    description: >-
      مسیر دایرکتوری برنامه‌های AppDaemon درون کانتینر این افزونه.

      از یک ویرایشگر فایل (مثلاً Studio Code Server) استفاده کنید تا
      /addon_configs/appdaemon/appdaemon.yaml را باز کنید و app_dir را تنظیم کنید:

        appdaemon:
          app_dir: "/homeassistant/apps"

      سپس این گزینه را به همان مسیر تنظیم کنید: /homeassistant/apps

  api_password:
    name: رمز عبور API AppDaemon
    description: >-
      مقدار api_password از پیکربندی HTTP API افزونه AppDaemon.
      اگر رمز عبور ندارد (پیش‌فرض) خالی بگذارید.
      فقط برای قابلیت راه‌اندازی مجدد برنامه‌ها لازم است.
