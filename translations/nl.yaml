configuration:
  log_level:
    name: Logniveau
    description: Uitgebreidheid van de eigen logboeken van AppDaemon Studio.

  appdaemon_addon_slug:
    name: AppDaemon-add-on slug
    description: >-
      De interne identificatie van je AppDaemon-add-on (bijv. a0d7b954_appdaemon).
      Wordt gebruikt om logboeken op te halen via de Supervisor API.
      Laat de standaardwaarde als je de standaard AppDaemon-add-on gebruikt.

  apps_folder:
    name: Apps-map
    description: >-
      Pad naar de AppDaemon-appmap in deze add-on-container.

      Gebruik een bestandseditor-add-on (bijv. Studio Code Server) om
      /addon_configs/appdaemon/appdaemon.yaml te openen en app_dir in te stellen:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Stel deze optie in op hetzelfde pad: /homeassistant/apps

  api_password:
    name: AppDaemon API-wachtwoord
    description: >-
      Het api_password uit de HTTP API-configuratie van AppDaemon.
      Laat leeg als er geen wachtwoord is (standaard).
      Alleen nodig voor de functie om apps opnieuw te starten.
