configuration:
  log_level:
    name: 日志级别
    description: AppDaemon Studio 自身日志的详细程度。

  appdaemon_addon_slug:
    name: AppDaemon 插件标识符
    description: >-
      您的 AppDaemon 插件的内部标识符（例如 a0d7b954_appdaemon）。
      用于通过 Supervisor API 获取日志。
      如果使用标准 AppDaemon 插件，保持默认值即可。

  apps_folder:
    name: 应用文件夹
    description: >-
      此插件容器内 AppDaemon 应用目录的路径。

      使用文件编辑器插件（如 Studio Code Server）打开
      /addon_configs/appdaemon/appdaemon.yaml，并设置 app_dir：

        appdaemon:
          app_dir: "/homeassistant/apps"

      然后将此选项设置为相同路径：/homeassistant/apps

  api_password:
    name: AppDaemon API 密码
    description: >-
      AppDaemon HTTP API 配置中的 api_password。
      如果没有密码（默认），请留空。
      仅用于应用重启功能。
