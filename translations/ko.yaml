configuration:
  log_level:
    name: 로그 수준
    description: AppDaemon Studio 자체 로그의 상세 수준입니다.

  appdaemon_addon_slug:
    name: AppDaemon 애드온 슬러그
    description: >-
      AppDaemon 애드온의 내부 식별자입니다 (예: a0d7b954_appdaemon).
      Supervisor API를 통해 로그를 가져오는 데 사용됩니다.
      표준 AppDaemon 애드온을 사용 중이라면 기본값을 유지하세요.

  apps_folder:
    name: 앱 폴더
    description: >-
      이 애드온 컨테이너 내부의 AppDaemon 앱 디렉터리 경로입니다.
      AppDaemon Studio와 AppDaemon은 config 볼륨을 통해
      같은 폴더를 공유해야 합니다 (컨테이너 내부의 /homeassistant).

      AppDaemon 애드온에서 설정 방법:
        1. AppDaemon 애드온 → 구성 탭 열기
        2. appdaemon.yaml을 편집하여 app_dir을 /homeassistant로 설정:
             appdaemon:
               app_dir: /homeassistant/apps
        3. 이 옵션을 같은 경로로 설정: /homeassistant/apps

      두 애드온 모두 기본적으로 "config" 볼륨이 마운트되어 있습니다.

  api_password:
    name: AppDaemon API 비밀번호
    description: >-
      AppDaemon HTTP API 구성의 api_password입니다.
      HTTP API에 비밀번호가 없는 경우 (기본값) 비워 두세요.
      앱 재시작 기능에만 필요합니다.
