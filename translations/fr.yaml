configuration:
  log_level:
    name: Niveau de journalisation
    description: Niveau de verbosité des journaux d'AppDaemon Studio.

  appdaemon_addon_slug:
    name: Slug de l'extension AppDaemon
    description: >-
      L'identifiant interne de votre extension AppDaemon (ex. a0d7b954_appdaemon).
      Utilisé pour récupérer les journaux via l'API Supervisor.
      Laissez la valeur par défaut si vous utilisez l'extension AppDaemon standard.

  apps_folder:
    name: Dossier des applications
    description: >-
      Chemin vers le répertoire des applications AppDaemon dans ce conteneur.

      Utilisez un éditeur de fichiers (ex. Studio Code Server) pour ouvrir
      /addon_configs/appdaemon/appdaemon.yaml et définir app_dir :

        appdaemon:
          app_dir: "/homeassistant/apps"

      Définissez ensuite cette option sur le même chemin : /homeassistant/apps

  api_password:
    name: Mot de passe de l'API AppDaemon
    description: >-
      Le api_password de la configuration HTTP API d'AppDaemon.
      Laissez vide si aucun mot de passe n'est défini (défaut).
      Nécessaire uniquement pour la fonction de redémarrage d'application.
