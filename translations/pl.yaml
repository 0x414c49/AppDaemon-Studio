configuration:
  log_level:
    name: Poziom dziennika
    description: Szczegółowość własnych dzienników AppDaemon Studio.

  appdaemon_addon_slug:
    name: Slug dodatku AppDaemon
    description: >-
      Wewnętrzny identyfikator Twojego dodatku AppDaemon (np. a0d7b954_appdaemon).
      Używany do pobierania dzienników przez API Supervisora.
      Pozostaw domyślną wartość, jeśli używasz standardowego dodatku AppDaemon.

  apps_folder:
    name: Folder aplikacji
    description: >-
      Ścieżka do katalogu aplikacji AppDaemon wewnątrz tego kontenera.

      Użyj dodatku edytora plików (np. Studio Code Server), aby otworzyć
      /addon_configs/appdaemon/appdaemon.yaml i ustawić app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Ustaw tę opcję na tę samą ścieżkę: /homeassistant/apps

  api_password:
    name: Hasło API AppDaemon
    description: >-
      Wartość api_password z konfiguracji HTTP API AppDaemon.
      Pozostaw puste, jeśli nie ma hasła (domyślnie).
      Wymagane tylko do funkcji ponownego uruchamiania aplikacji.
