configuration:
  log_level:
    name: Livello di registro
    description: Livello di dettaglio dei registri di AppDaemon Studio.

  appdaemon_addon_slug:
    name: Slug dell'add-on AppDaemon
    description: >-
      L'identificatore interno del tuo add-on AppDaemon (es. a0d7b954_appdaemon).
      Usato per recuperare i registri tramite l'API Supervisor.
      Lascia il valore predefinito se usi l'add-on AppDaemon standard.

  apps_folder:
    name: Cartella delle applicazioni
    description: >-
      Percorso alla directory delle applicazioni AppDaemon all'interno di questo container.

      Usa un add-on editor di file (es. Studio Code Server) per aprire
      /addon_configs/appdaemon/appdaemon.yaml e impostare app_dir:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Imposta questa opzione sullo stesso percorso: /homeassistant/apps

  api_password:
    name: Password API AppDaemon
    description: >-
      Il api_password dalla configurazione HTTP API di AppDaemon.
      Lascia vuoto se non c'è password (predefinito).
      Necessario solo per la funzione di riavvio delle applicazioni.
