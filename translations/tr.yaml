configuration:
  log_level:
    name: Günlük seviyesi
    description: AppDaemon Studio'nun kendi günlüklerinin ayrıntı düzeyi.

  appdaemon_addon_slug:
    name: AppDaemon eklenti tanımlayıcısı
    description: >-
      AppDaemon eklentinizin dahili tanımlayıcısı (örn. a0d7b954_appdaemon).
      Supervisor API aracılığıyla günlükleri almak için kullanılır.
      Standart AppDaemon eklentisini kullanıyorsanız varsayılanı bırakın.

  apps_folder:
    name: Uygulamalar klasörü
    description: >-
      Bu eklenti kapsayıcısı içindeki AppDaemon uygulamaları dizininin yolu.

      Bir dosya düzenleyici eklentisi (örn. Studio Code Server) kullanarak
      /addon_configs/appdaemon/appdaemon.yaml dosyasını açın ve app_dir'i ayarlayın:

        appdaemon:
          app_dir: "/homeassistant/apps"

      Ardından bu seçeneği aynı yola ayarlayın: /homeassistant/apps

  api_password:
    name: AppDaemon API şifresi
    description: >-
      AppDaemon HTTP API yapılandırmasındaki api_password.
      Şifre yoksa (varsayılan) boş bırakın.
      Yalnızca uygulama yeniden başlatma özelliği için gereklidir.
