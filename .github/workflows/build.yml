name: Build Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'lessons/**'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      previous_version: ${{ steps.bump.outputs.previous_version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Bump version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          CURRENT_VERSION=$(jq -r '.version' config.json)
          echo "previous_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          jq --arg version "$NEW_VERSION" '.version = $version' config.json > config.json.tmp
          mv config.json.tmp config.json
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          git add config.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push
          git push --tags

  generate-changelog:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="v${{ needs.bump-version.outputs.previous_version }}"
          NEW_TAG="v${{ needs.bump-version.outputs.version }}"
          
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            CHANGELOG=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD --no-merges -20)
          fi
          
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
          
          DATE=$(date +%Y-%m-%d)
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cat > changelog_entry.md << EOF
          ## [$NEW_TAG] - $DATE

          $CHANGELOG

          EOF
          
          if [ -f CHANGELOG.md ]; then
            head -n 1 CHANGELOG.md > CHANGELOG_new.md
            echo "" >> CHANGELOG_new.md
            cat changelog_entry.md >> CHANGELOG_new.md
            tail -n +2 CHANGELOG.md >> CHANGELOG_new.md
          else
            echo "# Changelog" > CHANGELOG_new.md
            echo "" >> CHANGELOG_new.md
            cat changelog_entry.md >> CHANGELOG_new.md
          fi
          
          mv CHANGELOG_new.md CHANGELOG.md
          
          git add CHANGELOG.md
          git commit -m "docs: update changelog for $NEW_TAG"
          git push

  build:
    needs: [bump-version, generate-changelog]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.version }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.bump-version.outputs.version }}
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [bump-version, generate-changelog, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.version }}
      
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG="${{ needs.generate-changelog.outputs.changelog }}"
          CHANGELOG="${CHANGELOG//'%0A'/$'\n'}"
          CHANGELOG="${CHANGELOG//'%0D'/$'\r'}"
          CHANGELOG="${CHANGELOG//'%25'/'%'}"
          
          gh release create v${{ needs.bump-version.outputs.version }} \
            --title "v${{ needs.bump-version.outputs.version }}" \
            --notes "$CHANGELOG"
