name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      skip_arm:
        description: 'Skip ARM (aarch64) build for faster iteration'
        type: boolean
        default: false
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'lessons/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_RAW: ${{ github.repository_owner }}/appdaemon-studio-addon

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Run backend tests
        run: dotnet test src/AppDaemonStudio.slnx --configuration Release --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          directory: coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/ui
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        working-directory: src/ui
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        working-directory: src/ui
        run: npm run dev &

      - name: Wait for dev server
        working-directory: src/ui
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run e2e tests
        working-directory: src/ui
        run: npx playwright test

  release:
    name: Version & Tag
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous_version: ${{ steps.version.outputs.previous_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      image_name: ${{ steps.image_name.outputs.lowercase }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Convert repository name to lowercase
        id: image_name
        run: echo "lowercase=$(echo '${{ env.IMAGE_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get versions
        id: version
        run: |
          CURRENT_VERSION=$(jq -r '.version' config.json)
          echo "previous_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="v${{ steps.version.outputs.previous_version }}"

          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            CHANGELOG=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD --no-merges -20)
          fi

          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"

          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Commit version and changelog
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          NEW_TAG="v$NEW_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          jq --arg version "$NEW_VERSION" '.version = $version' config.json > config.json.tmp
          mv config.json.tmp config.json

          jq --arg version "$NEW_VERSION" '.version = $version' src/ui/package.json > src/ui/package.json.tmp
          mv src/ui/package.json.tmp src/ui/package.json

          CHANGELOG="${{ steps.changelog.outputs.changelog }}"
          CHANGELOG="${CHANGELOG//'%0A'/$'\n'}"
          CHANGELOG="${CHANGELOG//'%0D'/$'\r'}"
          CHANGELOG="${CHANGELOG//'%25'/'%'}"

          DATE=$(date +%Y-%m-%d)

          cat > changelog_entry.md << EOF
          ## [$NEW_TAG] - $DATE

          $CHANGELOG

          EOF

          if [ -f CHANGELOG.md ]; then
            head -n 1 CHANGELOG.md > CHANGELOG_new.md
            echo "" >> CHANGELOG_new.md
            cat changelog_entry.md >> CHANGELOG_new.md
            tail -n +2 CHANGELOG.md >> CHANGELOG_new.md
          else
            echo "# Changelog" > CHANGELOG_new.md
            echo "" >> CHANGELOG_new.md
            cat changelog_entry.md >> CHANGELOG_new.md
          fi

          mv CHANGELOG_new.md CHANGELOG.md

          git add config.json src/ui/package.json CHANGELOG.md
          git commit -m "chore: release $NEW_TAG"
          git tag "$NEW_TAG"
          git push
          git push --tags

  # Job 2: Build React frontend once — artifact shared by both Docker matrix jobs
  build-frontend:
    name: Build Frontend
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Install dependencies
        working-directory: src/ui
        run: npm ci --prefer-offline --no-audit

      - name: Build
        working-directory: src/ui
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: src/ui/dist/
          retention-days: 1

  # Job 3: Build Docker images (parallel matrix)
  # No QEMU needed: --platform=$BUILDPLATFORM in Dockerfile means the
  # .NET SDK always cross-compiles on the x86 host.
  # Frontend is injected via --build-context; node-build stage is skipped entirely.
  build:
    name: Build ${{ matrix.platform }}
    needs: [release, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event.inputs.skip_arm == 'true' && '["linux/amd64"]' || '["linux/amd64","linux/arm64"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}
          fetch-depth: 1

      - name: Download pre-built frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: ./dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract platform name for tags
        id: platform
        run: |
          PLATFORM_PAIR=${{ matrix.platform }}
          PLATFORM_NAME=${PLATFORM_PAIR//\//-}
          echo "name=$PLATFORM_NAME" >> $GITHUB_OUTPUT

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:${{ needs.release.outputs.version }}-${{ steps.platform.outputs.name }}
          cache-from: type=gha,scope=build-${{ steps.platform.outputs.name }}
          cache-to: type=gha,mode=max,scope=build-${{ steps.platform.outputs.name }}
          build-contexts: frontend-dist=./dist
          build-args: |
            BUILD_VERSION=${{ needs.release.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}@${{ steps.build-push.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  # Job 3: Merge multi-platform manifests
  merge:
    name: Create Multi-Platform Manifest
    needs: [release, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        run: |
          IMAGES="${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:${{ needs.release.outputs.version }}-linux-amd64"
          if [ "${{ github.event.inputs.skip_arm }}" != "true" ]; then
            IMAGES="$IMAGES ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:${{ needs.release.outputs.version }}-linux-arm64"
          fi
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:${{ needs.release.outputs.version }} \
            -t ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:latest \
            $IMAGES

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:${{ needs.release.outputs.version }}

      - name: Get manifest digest
        id: manifest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:${{ needs.release.outputs.version }} \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}@${{ steps.manifest.outputs.digest }}

      - name: Attest manifest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  # Job 4: Create GitHub Release
  create-github-release:
    name: Create GitHub Release
    needs: [release, merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}
          fetch-depth: 1

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG="${{ needs.release.outputs.changelog }}"
          CHANGELOG="${CHANGELOG//'%0A'/$'\n'}"
          CHANGELOG="${CHANGELOG//'%0D'/$'\r'}"
          CHANGELOG="${CHANGELOG//'%25'/'%'}"

          gh release create v${{ needs.release.outputs.version }} \
            --title "v${{ needs.release.outputs.version }}" \
            --notes "$CHANGELOG"

  # Job 5: Summary
  summary:
    name: Build Summary
    needs: [test, release, build-frontend, build, merge, create-github-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Merge:** ${{ needs.merge.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ needs.create-github-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ needs.release.outputs.image_name }}:${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
